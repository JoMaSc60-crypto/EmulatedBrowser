<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EMU Browser</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  font-family: "Segoe UI", sans-serif;
}

body {
  background: radial-gradient(circle at center, #1a0000, #000);
  color: white;
  height: 100vh;
}

/* TOP BAR */
.topbar {
  display: flex;
  align-items: center;
  padding: 10px;
  background: rgba(20,20,20,0.8);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid rgba(255,255,255,0.1);
}

.logo {
  font-weight: bold;
  color: #ff4d4d;
  margin-right: 10px;
}

.nav-btn {
  margin: 0 5px;
  cursor: pointer;
  opacity: 0.7;
}

.nav-btn:hover {
  opacity: 1;
}

.topbar input {
  flex: 1;
  margin: 0 10px;
  padding: 8px 12px;
  border-radius: 20px;
  border: none;
  outline: none;
  background: #111;
  color: white;
}

.go-btn {
  background: #ff4d4d;
  border: none;
  padding: 8px 14px;
  border-radius: 8px;
  color: white;
  cursor: pointer;
}

/* CENTER CONTENT */
.center {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: calc(100vh - 60px);
  text-align: center;
}

.title {
  font-size: 42px;
  font-weight: bold;
  background: linear-gradient(90deg, #ffb3b3, #ff4d4d, #ff7a00);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.subtitle {
  margin-top: 8px;
  font-size: 14px;
  opacity: 0.6;
}

/* SEARCH BOX */
.search-box {
  margin-top: 30px;
  display: flex;
  background: rgba(20,20,20,0.9);
  border-radius: 20px;
  padding: 10px;
  width: 400px;
}

.search-box input {
  flex: 1;
  background: none;
  border: none;
  outline: none;
  color: white;
}

.search-btn {
  background: #ff4d4d;
  border: none;
  padding: 8px 12px;
  border-radius: 10px;
  color: white;
  cursor: pointer;
}

/* QUICK LINKS */
.quick-links {
  margin-top: 20px;
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 10px;
}

.link-btn {
  background: rgba(30,30,30,0.8);
  border: 1px solid rgba(255,255,255,0.1);
  padding: 8px 14px;
  border-radius: 10px;
  cursor: pointer;
  font-size: 14px;
}

.link-btn:hover {
  background: rgba(255,255,255,0.1);
}

/* PANELS */
.panel {
  margin-top: 20px;
  width: 400px;
  padding: 12px;
  border-radius: 12px;
  background: rgba(20,20,20,0.8);
  border: 1px solid rgba(255,255,255,0.1);
  opacity: 0.8;
}

.panel.locked {
  opacity: 0.4;
}

iframe {
  width: 100%;
  height: 100vh;
  border: none;
  display: none;
}
</style>
</head>

<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="logo">EMU</div>
  <div class="nav-btn" onclick="back()">←</div>
  <div class="nav-btn" onclick="forward()">→</div>
  <div class="nav-btn" onclick="reload()">⟳</div>

  <input id="topUrl" placeholder="Enter URL...">

  <button class="go-btn" onclick="go()">Go</button>
</div>

<!-- MAIN -->
<div class="center" id="home">

  <div class="title">EMU Browser Limitierte Edition</div>
  <div class="subtitle">Version 6.7 aka arsch version</div>

  <div class="search-box">
    <input id="mainUrl" placeholder="URL eingeben – z.B. roblox.com">
    <button class="search-btn" onclick="goMain()">→</button>
  </div>

  <div class="quick-links">
    <div class="link-btn" onclick="quick('https://google.com')">Google</div>
    <div class="link-btn" onclick="quick('https://youtube.com')">YouTube</div>
    <div class="link-btn" onclick="quick('https://tiktok.com')">TikTok</div>
    <div class="link-btn" onclick="quick('https://roblox.com')">Roblox</div>
    <div class="link-btn" onclick="quick('https://instagram.com')">Instagram</div>
    <div class="link-btn" onclick="quick('https://reddit.com')">Reddit</div>
    <div class="link-btn" onclick="quick('https://twitch.tv')">Twitch</div>
    <div class="link-btn" onclick="quick('https://twitter.com')">X / Twitter</div>
    <div class="link-btn" onclick="quick('https://netflix.com')">Netflix</div>
    <div class="link-btn" onclick="quick('https://wikipedia.org')">Wikipedia</div>
  </div>

  <div class="panel">ⓘ Information</div>
  <div class="panel locked">🔒 Admin Panel</div>

</div>

<!-- BROWSER VIEW -->
<iframe id="browser"></iframe>

<script>
const iframe = document.getElementById("browser");

function formatUrl(url) {
  if (!url.startsWith("http")) {
    if (url.includes(".")) {
      return "https://" + url;
    } else {
      return "https://www.google.com/search?q=" + encodeURIComponent(url);
    }
  }
  return url;
}

function go() {
  let url = document.getElementById("topUrl").value;
  load(url);
}

function goMain() {
  let url = document.getElementById("mainUrl").value;
  load(url);
}

function quick(url) {
  load(url);
}

function load(url) {
  url = formatUrl(url);
  iframe.src = url;
  iframe.style.display = "block";
  document.getElementById("home").style.display = "none";
}

function back() {
  iframe.contentWindow.history.back();
}

function forward() {
  iframe.contentWindow.history.forward();
}

function reload() {
  iframe.contentWindow.location.reload();
}
</script>

</body>
</html>
